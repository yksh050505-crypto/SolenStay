<!DOCTYPE html>
<html lang="ko">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="SolenStay - 숙소 청소 관리">
  <meta name="theme-color" content="#3B82F6">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="SolenStay">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!-- Pretendard 웹폰트 CDN -->
  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />

  <title>SolenStay</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* 로딩 중 빈 화면 방지 */
    body {
      margin: 0;
      padding: 0;
      background-color: #F8FAFC;
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    /* 스크롤바 숨기기 (PWA 느낌) */
    ::-webkit-scrollbar { width: 0; height: 0; }
    /* 텍스트 선택 방지 (앱 느낌) */
    * { -webkit-tap-highlight-color: transparent; }
    /* 로딩 스피너 */
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .loading-container p {
      margin-top: 16px;
      color: #64748B;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="loading" class="loading-container">
    <p>로딩 중...</p>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function() {
      var loader = document.getElementById('loading');
      if (loader) loader.remove();
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
